name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install NaMaster build dependencies
        run: sudo apt-get update && sudo apt-get install -y libgsl-dev libfftw3-dev libcfitsio-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # healpy lives in the optional [abacus] extra; a few tests import it directly
          pip install healpy
          # pymaster (NaMaster) is conda-only in pyproject (no PyPI wheel); build it from
          # the sdist against the system GSL/FFTW/CFITSIO installed above so the CMB
          # harmonic tests run on the pip-only CI runner
          pip install pymaster
          # s2fft is jax-healpy's "recommended" optional dep (used by the alm2map/map2alm
          # path); present via conda on NERSC but not pulled by the pip install here
          pip install s2fft
      - name: Run tests
        run: pytest -q
