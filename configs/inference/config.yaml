# Field-Level Inference Configuration
# Based on benchmark-field-level paper (arXiv:2504.20130) MCLMC section

# SLURM configuration for NERSC Perlmutter
slurm:
  job_name: fNL_joint_abacuslightcone
  account: desi
  qos: regular
  constraint: gpu
  nodes: 1
  gpus: 4
  time: "11:00:00"

# Model configuration
model:
  cell_size: 62.5  # Mpc/h
  box_shape: [2000.0, 2000.0, 2000.0]  # Mpc/h
  galaxies_enabled: true  # Set to false for cmb-only runs
  gxy_stoch_noise: false  # false : s_e fixed to 1 (pure Poisson), true : s_e inferred
  gxy_ngbar_free: true  # Free per-z-shell mean density -> marginalise the integral constraint
  lightcone: true
  # a_obs: 0.5556 # snapshot
  a_obs: null # lightcone
  curved_sky: true # applies to galaxy LOS and RSD; CMB lensing is always curved-sky (HEALPix)
  evolution: lpt # lpt or nbody
  lpt_order: 2
  precond: kaiser  # kaiser or kaiser_dyn
  init_oversamp: 1.5   # inferred linear field grid; enlarges the inferred field
  evol_oversamp: 1.75  # LPT evolution + bias-product mesh; add_png runs here too
  ptcl_oversamp: 1.75  # particle cloud density
  paint_oversamp: 1.75  # CIC paint mesh
  gxy_density: 8.43318125e-4 # used only in closure mode; overwritten by load_abacus_galaxy_observation in abacus mode
  # los: null  # Disable RSD (comment out to enable RSD)
  png_type: fNL  # 'fNL' = universality (b_phi/b_phi_delta derived from b1/b2); 'fNL_bias' = infer fNL, fNL*b_phi, fNL*b_phi_delta as free params. null/omit = Gaussian

# CMB lensing configuration
cmb_lensing:
  enabled: true # Set to false for galaxy-only runs
  z_source: 1089.0   # CMB redshift
  nside: 32          # HEALPix nside for curved-sky convergence map
  n_shells: 32      # number of radial Born integration shells
  cmb_noise_nell: "/global/homes/j/jhawla/thesis-desi-cmb-fli/data/N_L_kk_act_dr6_lensing_v1_baseline.txt"
  cmb_noise_scaling: 1.0  # Artificial scaling factor (0.01 = divide N_l by 100)
  full_los_correction: true
  high_z_mode: fixed # fixed, taylor, exact_linear or exact
  likelihood_mode: pixel_exact # diagonal (fast; exact on full sky; over-confident on cut sky) | pixel_exact (exact cut-sky via signal-eigenmode/KL: diagonalises the observed-pixel covariance once, keeps the supported Slepian subspace; full mask coupling kept exactly; requires fixed cosmo + high_z_mode=fixed)
  kl_rcond: 1e-2  # pixel_exact: keep eigenmodes with lambda > kl_rcond*lambda_max (default 1e-6; lower=more complete but more fragile in float32)
  chi_high_z_max: 3990  # chi_max for the full LOS high-z correction in Mpc/h. Comment for cmb source plane comoving distance (real data). For AbacusSummit runs with base z_max=2.45, set this to 3990 Mpc/h. For AbacusSummit runs with HUGE, set this to 3942 Mpc/h.
  observer_mode: corner # center, face, or corner. Use 'corner' for AbacusSummit base-box (octant footprint); 'center' for full-sky closure / huge-box.
  mask: data/abacus_kappa_mask_00047.npy # External HEALPix footprint mask (npy/FITS). For AbacusSummit base-box abacus runs, set to data/abacus_kappa_mask_00047.npy (built by scripts/make_abacus_kappa_mask.py).

# Truth parameters (closure test only — ignored in abacus/real-data modes)
truth_params:
  Omega_m: 0.315192
  sigma8: 0.811355
  # Lagrangian biases
  b1: 1.15
  b2: 0.0
  bs2: 0.0
  bn2: 0.0
  fNL: 0.0  # Local non-Gaussianity amplitude (only used when model.png_type is set)

# Prior parameters (latents)
latents:
  Omega_m:
    loc: 0.315192
    scale: 0.15
    scale_fid: 0.05
    loc_fid: 0.315192
    low: 0.10
    high: 0.60
  sigma8:
    loc: 0.811355
    scale: 0.15
    scale_fid: 0.05
    loc_fid: 0.811355
    low: 0.5
    high: 1.2
  b1:
    loc: 0.8
    scale: 100.0
    scale_fid: 0.01
    loc_fid: 0.8
  b2:
    loc: 0.0
    scale: 100.0
    scale_fid: 0.03
    loc_fid: 0.0
  bs2:
    loc: 0.0
    scale: 100.0
    scale_fid: 0.1
    loc_fid: 0.0
  bn2:
    loc: 0.0
    scale: 1000.0
    scale_fid: 1.0
    loc_fid: 0.0
  bnpar: # keep it in fixed_params for snapshot/no-RSD runs, infer it for lightcone+RSD.
    loc: 0.0
    scale: 100.0
    scale_fid: 1.0
    loc_fid: 0.0

# MCMC configuration
mcmc:
  num_warmup: 8192

  # Fix some scalar latents to their truth/fiducial value (only the rest are inferred).
  fixed_params: [Omega_m, sigma8]

  # Sampling
  num_samples: 50
  num_batches: 260
  num_chains: 4

  save_large_fields: false

  scalar_precond: true

  mclmc:
    desired_energy_var: 0.0000005 # Value which work well for runs with realistic noise : 0.0000005
    diagonal_preconditioning: true
    thinning: 5

# Observation mode: "closure" or "abacus"
observation_mode: abacus

# AbacusSummit c000 true cosmology (used as corner-plot markers in abacus mode)
abacus_truth_params:
  Omega_m: 0.315192
  sigma8: 0.811355
  fNL: 0.0
  # Only used when png_type=fNL_bias :
  fNL_bp: 0.0
  fNL_bpd: 0.0

abacus_kappa:
  file: "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/v1/AbacusSummit_base_c000_ph000/kappa_00047.asdf" # AbacusSummit base-box kappa map
  # file: "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/v1/AbacusSummit_huge_c000_ph201/kappa_00045.asdf" # AbacusSummit huge-box kappa map (full-sky, cmb-only because there are no galaxies in the huge simulation)
  noise_seed: 6482  # seed for the random noise realization added to the kappa map

# Abacus galaxy catalog
abacus_galaxy:
  file: # "/dvs_ro/cfs/cdirs/desi/cosmosim/SecondGenMocks/CubicBox/LRG/z0.800/AbacusSummit_base_c000_ph000/LRG_real_space.fits" #snapshot (galaxy-only because no CMB lensing in the snapshot simulation)
    # AbacusSummit base-box lightcone galaxy catalogs
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.400/catalog_DESI_LRG.asdf"
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.450/catalog_DESI_LRG.asdf"
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.500/catalog_DESI_LRG.asdf"
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.575/catalog_DESI_LRG.asdf"
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.650/catalog_DESI_LRG.asdf"
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.725/catalog_DESI_LRG.asdf"
    - "/global/cfs/cdirs/desi/cosmosim/AbacusLensing/mocks/DESI/AbacusSummit_base_c000_ph000/z0.800/catalog_DESI_LRG.asdf"

# Random seed
seed: 77
